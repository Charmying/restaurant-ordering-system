<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>RestaurantOrderingSystem</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="ordering.jpg">
  <script>
    (function() {
      const t = localStorage.getItem('app_theme');
      const theme = t === 'light' || t === 'dark' ? t : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
