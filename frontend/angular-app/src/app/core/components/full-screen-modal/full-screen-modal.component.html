<div (click)="onBackdropClick()" role="presentation" aria-hidden="true" class="fixed inset-0 z-40 bg-[rgba(var(--surface-overlay),0.2)] backdrop-blur-sm transition-opacity duration-300" [class.pointer-events-none]="!closeOnBackdropClick()"></div>
<div class="fixed inset-0 z-50 flex flex-col overflow-hidden bg-surface w-screen h-screen animate-slide-up" role="dialog" aria-modal="true" tabindex="-1" [attr.aria-labelledby]="title() ? 'fsm-title' : null">
  <header class="shrink-0 h-14 border-b border-default bg-surface flex items-center px-5 sm:px-8 lg:px-10 self-center w-full max-w-5xl">
    <div class="flex items-center gap-4 w-full min-w-0">
      @if (showBackButton()) {
        <button type="button" (click)="close.emit()"
          class="shrink-0 w-11 h-11 flex items-center justify-center rounded-full interactive"
          [attr.aria-label]="'common.back' | translate"
          aria-haspopup="false">
          <svg class="w-6 h-6 text-primary stroke-2" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </button>
      }
      @if (title()) {
        <h1 class="text-xl sm:text-2xl font-bold text-primary leading-tight m-0 flex-1 min-w-0 overflow-hidden text-ellipsis whitespace-nowrap" [id]="'fsm-title'">
          {{ title() }}
        </h1>
      }
    </div>
  </header>
  <main class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth self-center w-full max-w-5xl">
    <ng-content select="[slot='content']"></ng-content>
  </main>
  <footer class="shrink-0 bg-surface transition-smooth self-center w-full max-w-5xl" [class.border-t]="showFooterDivider()" [class.border-default]="showFooterDivider()">
    <ng-content select="[slot='footer']"></ng-content>
  </footer>
</div>
